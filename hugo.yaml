baseURL: "https://nycu-meaa.github.io/"
languageCode: "zh-tw"
defaultContentLanguage: "zh-tw"
title: "NYCU MEAA | 交大機械系友會"
theme: "Hextra"

outputs:
  home: [HTML, RSS, JSON]

# 讓所有內容預設使用 docs 佈局以開啟側邊欄
cascade:
  - type: "docs"

languages:
  zh-tw:
    languageName: "繁體中文"
    menu:
      main:
        - name: "50 週年系慶"
          url: "/anniversary/"
          weight: 10
        - name: "資源對接"
          url: "/network/"
          weight: 20
        - name: "組織治理"
          url: "/governance/"
          weight: 30
        - name: "系友社群"
          url: "/community/"
          weight: 40
        - name: "搜尋"
          weight: 50
          params:
            type: "search"

params:
  displayNames:
    zh-tw: "繁體中文"
  editURL:
    base: "https://github.com/wuulong/NYCU-MEAA/edit/main/content"
  search:
    enable: true
    nextjs: false # 使用 FlexSearch 模式
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
    content: "🚀 本站內容由系友會轉型團隊與 AI 助手深度共創生成"
    extra: "🚀 本站內容由系友會轉型團隊與 AI 助手深度共創生成"
